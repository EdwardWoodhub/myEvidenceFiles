name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - run: npm install
      - run: npm run sources 
      
      # 这里是关键：强制注入 base 路径，并解决下划线文件夹被 GitHub 屏蔽的问题
      - name: Build with Fixed Base Path
        run: |
          npm run build
          # 这一行解决所有的 404 权限问题
          touch build/.nojekyll
        env:
          # 必须同时设置这两个变量，确保 Vite 插件和 Evidence 核心同时感知路径
          EVIDENCE_SITE_URL: "https://edwardwoodhub.github.io/myEvidenceFiles"
          BASE_PATH: "/myEvidenceFiles"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4