name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - run: npm install
      - run: npm run sources 
      
      - name: Build and Precision Path Fix
        run: |
          # 1. 执行标准构建
          npm run build
          
          # 2. 【核心手术】精准、不重复地修正路径
          REPO_NAME="myEvidenceFiles"
          
          echo "正在执行路径对齐手术..."

          # 修正 JS/HTML/CSS 里的核心资源路径
          # 我们匹配 "/_app/"，并确保它前面没有重复的仓库名
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i "s|\"/_app/|\"/$REPO_NAME/_app/|g" {} +
          find build -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" \) -exec sed -i "s|\"/data/|\"/$REPO_NAME/data/|g" {} +
          
          # 修正 HTML 里的 src/href 属性 (只替换以 / 开头的绝对路径)
          find build -type f -name "*.html" -exec sed -i "s|href=\"/|href=\"/$REPO_NAME/|g" {} +
          find build -type f -name "*.html" -exec sed -i "s|src=\"/|src=\"/$REPO_NAME/|g" {} +

          # 3. 【解决字体 404】修正 CSS 里的字体 url 引用
          find build -type f -name "*.css" -exec sed -i "s|url(/|url(/$REPO_NAME/|g" {} +

          # 4. 【关键通行证】创建 .nojekyll，强制 GitHub 开放 _app 文件夹
          touch build/.nojekyll
          
          echo "修正完成。验证路径："
          grep -o "/$REPO_NAME/_app/" build/index.html | head -n 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4