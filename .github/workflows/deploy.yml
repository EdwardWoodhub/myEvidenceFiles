name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install
        run: npm install
      
      - name: Extract Sources
        run: npm run sources 
      
      - name: Build and Global Path Fix
        run: |
          # 1. 正常构建
          npm run build
          
          # 2. 【全量物理手术】
          # 定义需要修正的目标类型和路径模式
          TARGET_FILES='\( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.webmanifest" \)'
          SUB_PATH="/myEvidenceFiles"

          # 强制替换所有核心文件夹的引用
          find build -type f $TARGET_FILES -exec sed -i "s|/_app/|$SUB_PATH/_app/|g" {} +
          find build -type f $TARGET_FILES -exec sed -i "s|/data/|$SUB_PATH/data/|g" {} +
          
          # 修正特定的 HTML 属性（处理图片、链接、Manifest、Favicon）
          find build -type f -name "*.html" -exec sed -i "s|src=\"/|src=\"$SUB_PATH/|g" {} +
          find build -type f -name "*.html" -exec sed -i "s|href=\"/|href=\"$SUB_PATH/|g" {} +
          find build -type f -name "*.html" -exec sed -i "s|/manifest.webmanifest|$SUB_PATH/manifest.webmanifest|g" {} +
          find build -type f -name "*.html" -exec sed -i "s|/favicon.ico|$SUB_PATH/favicon.ico|g" {} +

          # 3. 解决 GitHub Pages 的下划线屏蔽
          touch build/.nojekyll
          
          echo "--- 全量物理路径修正完成 ---"
          # 验证首页的 JS 入口路径是否正确
          grep -o 'src="/myEvidenceFiles/_app/[^"]*"' build/index.html | head -n 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4