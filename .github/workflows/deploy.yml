name: Deploy Evidence Site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      
      - name: Install & Source
        run: |
          npm install
          npm run sources
      
      - name: Build and Relativize
        run: |
          # 1. 执行标准构建
          npm run build
          
          # 2. 【核心手术】将所有绝对路径降级为相对路径
          # 这样浏览器就会在当前目录下寻找 _app 和 data 文件夹
          # 我们只针对 src="/ 和 href="/ 这种标准的 HTML 属性进行操作
          find build -type f -name "*.html" -exec sed -i 's|src="/|src="./|g' {} +
          find build -type f -name "*.html" -exec sed -i 's|href="/|href="./|g' {} +
          
          # 3. 【精准修复 JS】让 JS 内部的动态导入也变成相对路径
          # 我们把 "/_app/" 替换为 "./_app/"，把 "/data/" 替换为 "./data/"
          find build -type f -name "*.js" -exec sed -i 's|"/_app/|"./_app/|g' {} +
          find build -type f -name "*.js" -exec sed -i 's|"/data/|"./data/|g' {} +

          # 4. 【解决下划线屏蔽】
          # 如果没有这个文件，GitHub 绝对不会让你访问 _app 文件夹
          touch build/.nojekyll
          
          echo "--- 相对路径转换完成 ---"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4